security:
    password_hashers:
        App\Entity\User:
            algorithm: bcrypt
            cost: 13
            migrate_from:
                - sha512

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        metadata:
            pattern: ^/api/(federation/metadata|tenant/[^/]+/metadata)$
            security: false

        main:
            lazy: true
            provider: app_user_provider

            custom_authenticators:
                - App\Security\LoginFormAuthenticator

            logout:
                path: app_logout
                target: app_login

            remember_me:
                secret: '%kernel.secret%'
                lifetime: 604800  # 7 days
                secure: true
                samesite: strict

            # Brute-force protection via rate limiter
            login_throttling:
                max_attempts: 5
                interval: '15 minutes'

    access_control:
        - { path: ^/$,             roles: PUBLIC_ACCESS }
        - { path: ^/healthz,        roles: PUBLIC_ACCESS }
        - { path: ^/login,          roles: PUBLIC_ACCESS }
        - { path: ^/register,       roles: PUBLIC_ACCESS }
        - { path: ^/tenant/[^/]+/register, roles: PUBLIC_ACCESS }
        - { path: ^/tenant/[^/]+/forgot-password, roles: PUBLIC_ACCESS }
        - { path: ^/tenant-users/reset/, roles: PUBLIC_ACCESS }
        - { path: ^/forgot-password, roles: PUBLIC_ACCESS }
        - { path: ^/reset-password, roles: PUBLIC_ACCESS }
        - { path: ^/api/federation/metadata$, roles: PUBLIC_ACCESS }
        - { path: ^/api/tenant/[^/]+/metadata$, roles: PUBLIC_ACCESS }
        - { path: ^/admin/super,    roles: ROLE_SUPER_ADMIN }
        - { path: ^/admin,          roles: ROLE_ADMIN }
        - { path: ^/,               roles: ROLE_USER }

    role_hierarchy:
        ROLE_ADMIN:       ROLE_USER
        ROLE_SUPER_ADMIN: [ROLE_ADMIN, ROLE_ALLOWED_TO_SWITCH]
