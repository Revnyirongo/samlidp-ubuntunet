; ── UbuntuNet IdP — PHP-FPM Pool ─────────────────────────────
[www]
user  = app
group = app

listen = 0.0.0.0:9000
listen.owner = app
listen.group = app

; Dynamic process management
pm = dynamic
pm.max_children      = 50
pm.start_servers     = 5
pm.min_spare_servers = 5
pm.max_spare_servers = 20
pm.max_requests      = 1000

; Slow log (requests > 5s)
request_slowlog_timeout = 5s
slowlog = /proc/self/fd/2

; Status page (only accessible from within container)
pm.status_path = /fpm-status
ping.path      = /fpm-ping

; Env pass-through
clear_env = no

; Logging
access.log = /proc/self/fd/2
access.format = "%R - %u %t \"%m %r%Q%q\" %s %f %{mili}dms %{kilo}MMb"

; Security
security.limit_extensions = .php
