<VirtualHost *:80>
    ServerName localhost
    DocumentRoot /var/simplesamlphp/public

    <Directory /var/simplesamlphp/public>
        Options +FollowSymLinks -Indexes
        AllowOverride All
        Require all granted
    </Directory>

    # Pass tenant slug from subdomain via env var
    # Nginx sets X-Tenant-Slug header; SSP reads it
    SetEnvIf X-Tenant-Slug "^([a-z0-9\-]+)$" TENANT_SLUG=$1
    SetEnvIf X-Forwarded-Proto "^https$" HTTPS=on
    SetEnvIf X-Forwarded-Port "^443$" SERVER_PORT=443

    # Security headers
    Header always set X-Frame-Options "DENY"
    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always unset X-Powered-By
    Header always unset Server

    # Logs to stdout/stderr for Docker
    ErrorLog /proc/self/fd/2
    CustomLog /proc/self/fd/1 combined

    # PHP FPM
    <FilesMatch \.php$>
        SetHandler application/x-httpd-php
    </FilesMatch>
</VirtualHost>
